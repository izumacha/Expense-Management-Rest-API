name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - name: Restore (locked)
        run: dotnet restore --locked-mode
      - name: Format check
        run: dotnet format --verify-no-changes --severity warn
      - name: Vulnerable packages
        run: |
          set -euo pipefail
          dotnet list package --vulnerable --include-transitive 2>&1 | tee vuln.txt
          if grep -E '>\s+(High|Critical)' vuln.txt; then
            echo "::error::High or Critical vulnerability detected"
            exit 1
          fi

  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/Directory.Packages.props', '**/packages.lock.json') }}
          restore-keys: |
            nuget-
      - name: Restore (locked)
        run: dotnet restore --locked-mode
      - name: Build
        run: dotnet build --configuration Release --no-restore
      - name: Test
        run: dotnet test --no-build --configuration Release --logger trx
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/TestResults/*.trx'
          if-no-files-found: error
